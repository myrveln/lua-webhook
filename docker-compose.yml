services:
  valkey:
    image: valkey/valkey:7.2-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  openresty:
    build: .
    ports:
      - "8080:80"
    environment:
      WEBHOOK_REDIS_HOST: valkey
      WEBHOOK_REDIS_PORT: "6379"
      WEBHOOK_API_KEYS: ${WEBHOOK_API_KEYS:-}
      WEBHOOK_API_KEY_HASHES: ${WEBHOOK_API_KEY_HASHES:-}
      WEBHOOK_AUTH_EXEMPT: ${WEBHOOK_AUTH_EXEMPT:-}

      # Opt-in features / hardening
      WEBHOOK_CORS_ALLOW_ORIGIN: ${WEBHOOK_CORS_ALLOW_ORIGIN:-}
      WEBHOOK_CORS_ALLOW_METHODS: ${WEBHOOK_CORS_ALLOW_METHODS:-}
      WEBHOOK_CORS_ALLOW_HEADERS: ${WEBHOOK_CORS_ALLOW_HEADERS:-}
      WEBHOOK_CORS_EXPOSE_HEADERS: ${WEBHOOK_CORS_EXPOSE_HEADERS:-}
      WEBHOOK_CORS_ALLOW_CREDENTIALS: ${WEBHOOK_CORS_ALLOW_CREDENTIALS:-}
      WEBHOOK_CORS_MAX_AGE_S: ${WEBHOOK_CORS_MAX_AGE_S:-}

      WEBHOOK_RATE_LIMIT_ENABLED: ${WEBHOOK_RATE_LIMIT_ENABLED:-}
      WEBHOOK_RATE_LIMIT_WINDOW_S: ${WEBHOOK_RATE_LIMIT_WINDOW_S:-}
      WEBHOOK_RATE_LIMIT_MAX_REQUESTS: ${WEBHOOK_RATE_LIMIT_MAX_REQUESTS:-}
      WEBHOOK_RATE_LIMIT_EXEMPT: ${WEBHOOK_RATE_LIMIT_EXEMPT:-}

      WEBHOOK_CALLBACK_URL_ALLOWLIST: ${WEBHOOK_CALLBACK_URL_ALLOWLIST:-}
      WEBHOOK_CALLBACK_URL_ALLOW_HTTP: ${WEBHOOK_CALLBACK_URL_ALLOW_HTTP:-}
      WEBHOOK_CALLBACK_URL_BLOCK_PRIVATE_IPS: ${WEBHOOK_CALLBACK_URL_BLOCK_PRIVATE_IPS:-}
      WEBHOOK_CALLBACK_URL_MAX_LEN: ${WEBHOOK_CALLBACK_URL_MAX_LEN:-}
    depends_on:
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/webhook/_stats"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Second instance used by ./tests/test_config.py to validate webhook_config module overrides.
  openresty_config:
    build: .
    ports:
      - "8081:80"
    environment:
      WEBHOOK_REDIS_HOST: valkey
      WEBHOOK_REDIS_PORT: "6379"
      WEBHOOK_CONFIG_MODULE: webhook_config_test
      WEBHOOK_API_KEYS: ${WEBHOOK_API_KEYS:-}
      WEBHOOK_API_KEY_HASHES: ${WEBHOOK_API_KEY_HASHES:-}
      WEBHOOK_AUTH_EXEMPT: ${WEBHOOK_AUTH_EXEMPT:-}

      WEBHOOK_CORS_ALLOW_ORIGIN: ${WEBHOOK_CORS_ALLOW_ORIGIN:-}
      WEBHOOK_CORS_ALLOW_METHODS: ${WEBHOOK_CORS_ALLOW_METHODS:-}
      WEBHOOK_CORS_ALLOW_HEADERS: ${WEBHOOK_CORS_ALLOW_HEADERS:-}
      WEBHOOK_CORS_EXPOSE_HEADERS: ${WEBHOOK_CORS_EXPOSE_HEADERS:-}
      WEBHOOK_CORS_ALLOW_CREDENTIALS: ${WEBHOOK_CORS_ALLOW_CREDENTIALS:-}
      WEBHOOK_CORS_MAX_AGE_S: ${WEBHOOK_CORS_MAX_AGE_S:-}

      WEBHOOK_RATE_LIMIT_ENABLED: ${WEBHOOK_RATE_LIMIT_ENABLED:-}
      WEBHOOK_RATE_LIMIT_WINDOW_S: ${WEBHOOK_RATE_LIMIT_WINDOW_S:-}
      WEBHOOK_RATE_LIMIT_MAX_REQUESTS: ${WEBHOOK_RATE_LIMIT_MAX_REQUESTS:-}
      WEBHOOK_RATE_LIMIT_EXEMPT: ${WEBHOOK_RATE_LIMIT_EXEMPT:-}

      WEBHOOK_CALLBACK_URL_ALLOWLIST: ${WEBHOOK_CALLBACK_URL_ALLOWLIST:-}
      WEBHOOK_CALLBACK_URL_ALLOW_HTTP: ${WEBHOOK_CALLBACK_URL_ALLOW_HTTP:-}
      WEBHOOK_CALLBACK_URL_BLOCK_PRIVATE_IPS: ${WEBHOOK_CALLBACK_URL_BLOCK_PRIVATE_IPS:-}
      WEBHOOK_CALLBACK_URL_MAX_LEN: ${WEBHOOK_CALLBACK_URL_MAX_LEN:-}
    volumes:
      - ./tests/fixtures/webhook_config_test.lua:/usr/local/openresty/lualib/webhook_config_test.lua:ro
    depends_on:
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/webhook/_stats"]
      interval: 10s
      timeout: 5s
      retries: 5
