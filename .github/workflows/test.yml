name: Webhook Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      WEBHOOK_TEST_API_KEY_HASH: ""

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Compose
      uses: docker/setup-compose-action@v1
      with:
        version: latest

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Install dependencies
      run: |
        cd tests
        python3 -m venv .venv
        .venv/bin/pip install -r requirements.txt

    - name: Compute hashed API key (sha256)
      run: |
        python - <<'PY' >> "$GITHUB_ENV"
        import hashlib
        key = b"test-api-key"
        print("WEBHOOK_TEST_API_KEY_HASH=" + hashlib.sha256(key).hexdigest())
        PY

    - name: Run tests (no-auth)
      env:
        BASE_URL: http://localhost:8080/webhook
        BASE_URL_CONFIG: http://localhost:8081/webhook
        TEST_CONFIG_API_KEY: test-config-key
        PYTEST_ARGS: "--cov=. --cov-report="
      run: |
        cd tests
        make test noauth

    - name: Run tests (auth enabled)
      env:
        BASE_URL: http://localhost:8080/webhook
        BASE_URL_CONFIG: http://localhost:8081/webhook
        TEST_API_KEY: test-api-key
        TEST_CONFIG_API_KEY: test-config-key
        PYTEST_ARGS: "--cov=. --cov-append --cov-report="
      run: |
        cd tests
        make test auth

    - name: Run tests (CORS)
      env:
        BASE_URL: http://localhost:8080/webhook
        TEST_API_KEY: test-api-key
        PYTEST_ARGS: "--cov=. --cov-append --cov-report="
      run: |
        cd tests
        make test cors

    - name: Run tests (rate limiting)
      env:
        BASE_URL: http://localhost:8080/webhook
        TEST_API_KEY: test-api-key
        PYTEST_ARGS: "--cov=. --cov-append --cov-report="
      run: |
        cd tests
        make test rate_limit

    - name: Run tests (hashed auth)
      env:
        BASE_URL: http://localhost:8080/webhook
        TEST_API_KEY: test-api-key
        PYTEST_ARGS: "--cov=. --cov-append --cov-report="
      run: |
        cd tests
        make test hash_auth

    - name: Run tests (callback allowlist)
      env:
        BASE_URL: http://localhost:8080/webhook
        TEST_API_KEY: test-api-key
        PYTEST_ARGS: "--cov=. --cov-append --cov-report="
      run: |
        cd tests
        make test callback_allowlist

    - name: Generate merged coverage.xml
      if: always()
      run: |
        cd tests
        coverage xml -o coverage.xml

    - name: Coverage summary
      if: always()
      run: |
        python .github/scripts/coverage_summary.py tests/coverage.xml

    - name: Upload coverage artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-xml
        path: tests/coverage.xml
        if-no-files-found: warn

    - name: Show logs on failure
      if: failure()
      run: docker compose logs

    - name: Stop services
      if: always()
      run: docker compose down

    - name: Upload coverage
      if: (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && env.CODECOV_TOKEN != ''
      uses: codecov/codecov-action@v5
      with:
        token: ${{ env.CODECOV_TOKEN }}
        files: tests/coverage.xml
